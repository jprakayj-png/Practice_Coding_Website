<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width , initial-scale = 1.0 " />
    <title>New Year Countdown</title>

    <!--css link file-->

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <p class="subtitle">COUNT DOWN TO NEW YEAR : Bangkok </p>
        <h1 class="year">2026</h1>
        <div class="countdown-box">
            <div class="time">
                <h2 id="days">00</h2>
                <span>Day(s) : </span>
            </div>
            <div class="time">
                <h2 id="hours">00</h2>
                <span>Hour(s) : </span>
            </div>
            <div class="time">
                <h2 id="minutes">00</h2>
                <span>Minute(s) : </span>
            </div>
            <div class="time">
                <h2 id="seconds">00</h2>
                <span>Second(s) : </span>
            </div>
        </div>
    </div>

    <!--java script -->
    <script src="script.js"></script>
</body>
